[mcu RP2040]
baud: 115200
restart_method: command
# Obtain definition by "ls -l /dev/serial/by-id/"
serial: /dev/serial/by-id/usb-Klipper_rp2040_5303284730F0A91C-if00

[adxl345]
cs_pin: RP2040:gpio5
# spi_bus: spi0a
spi_software_sclk_pin: RP2040:gpio2
spi_software_mosi_pin: RP2040:gpio3
spi_software_miso_pin: RP2040:gpio4


