#————————————————————————————————————————| SAMPLE |————————————————————————————————————————#

[gcode_shell_command hello_world]
command: echo hello world
timeout: 2.
verbose: True

[gcode_macro HELLO_WORLD]
gcode:
    RUN_SHELL_COMMAND CMD=hello_world

#————————————————————————————————————————| SHUTDOWN / REBOOT |————————————————————————————————————————#

[gcode_shell_command shutdown_host]
command: sudo shutdown -h now
timeout: 10.
verbose: True

[gcode_macro SHUTDOWN_PRINTER]
description: Shutdown the Klipper host
gcode:
	END
    M118 Shutting down host...
    RUN_SHELL_COMMAND CMD=shutdown_host
    
#————————————————————————————————————————#

[gcode_shell_command reboot_host]
command: sudo reboot
timeout: 10.
verbose: True

[gcode_macro REBOOT_PRINTER]
description: Reboot the Klipper host
gcode:
    RUN_SHELL_COMMAND CMD=reboot_host