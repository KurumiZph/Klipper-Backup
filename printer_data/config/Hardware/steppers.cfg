[stepper_x]
step_pin: PA12
dir_pin: PA11
enable_pin: !PA15
microsteps: 16
rotation_distance: 40
position_endstop: -7
position_min: -7
position_max: 230
homing_speed: 100
endstop_pin: !PH2
homing_retract_dist: 10

[stepper_y]
step_pin: PA9
dir_pin: PA8
enable_pin: !PA15
microsteps: 16
rotation_distance: 40
position_endstop: -24
position_min: -24
position_max: 213
homing_speed: 100
endstop_pin: ^!PC13
homing_retract_dist: 10

[stepper_z]
step_pin: PC7
dir_pin: !PC6
enable_pin: !PA15
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop #Default = ^PC14, Acceptable = probe:z_virtual_endstop (Inductive Probe) / ^PC14 (Interrupt Senser)
position_min: -1.5
position_max: 240
#position_endstop: 4.565
homing_speed: 8
second_homing_speed:2
homing_retract_dist: 2

[safe_z_home]
home_xy_position: 10, 10
speed: 65
z_hop: 10  
z_hop_speed: 10

[extruder]
max_extrude_only_distance: 101.0
step_pin: PB15
dir_pin: PB14
enable_pin: !PA15
microsteps: 16
rotation_distance: 22.23426471 # Calibrate the rotation distance for your specific setup!
gear_ratio: 50:10 # Sherpa Mini 10T motor
full_steps_per_rotation: 200 # 1.8deg Motor
nozzle_diameter: 0.400 # Set your nozzle diameter.
filament_diameter: 1.750
heater_pin: PB8
sensor_type: Generic 3950 # Seems to give more precise results than the ATC.
sensor_pin: PC3
min_temp: 0
min_extrude_temp: 180
max_temp: 270
max_extrude_cross_section: 5
pressure_advance: 0.06 # Adjust to your Pressure Advance tests.
pressure_advance_smooth_time: 0.04 # default = 0.04; you can try smaller smooth time together with smaller pressure advance value.