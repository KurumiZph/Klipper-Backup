#--------------------------------| ACCELEROMETER |--------------------------------#

[mcu adxl]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5303284730F0A91C-if00

[adxl345]
cs_pin: adxl:gpio5
spi_bus: spi0a

[resonance_tester]
accel_chip: adxl345
probe_points:
    100, 100, 20

#--------------------------------| WIPER |--------------------------------#

[servo wipe_servo]
pin: rpi:gpio27
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
initial_angle: 0

#--------------------------------| LEDS |--------------------------------#

[neopixel toolhead_leds]
pin: rpi:gpio10
chain_count: 3
